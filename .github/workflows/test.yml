# .github/workflows/tests.yml
name: Tests
on:
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    # 1. Start a real Postgres database on the runner's localhost:5432
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: launchpad
        ports:
          - 5432:5432
        # Ensure the DB is ready before the steps start
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/launchpad"
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'test' }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'test' }}
      APP_SECRET: ${{ secrets.secret || 'test' }}
      GOOGLE_LOGIN_REDIRECT_URL: ${{ secrets.GOOGLE_LOGIN_REDIRECT_URL || 'test' }}
      GOOGLE_AUTH_REDIRECT_URL: ${{ secrets.GOOGLE_AUTH_REDIRECT_URL || 'test' }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID || 'test' }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN || 'test' }}
      GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN || 'test' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Build and Install Dependencies
        uses: ./.github/actions/build

      # 2. Setup Database Schema (Required for Prisma + Playwright)
      - name: Prisma Migrate and Generate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Build project
        run: npm run build

      - name: Start server in background
        shell: bash
        run: |
          nohup npm run start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server to be ready
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8000 >/dev/null; then
              echo "server up"
              exit 0
            fi
            sleep 2
          done
          echo "server did not start" >&2
          cat server.log || true
          exit 1

      # 3. Install Playwright Browsers (Required for Ubuntu)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 4. Run the actual tests (chromium only to reduce flakiness)
      - name: Run Playwright tests (chromium only)
        run: npx playwright test --project=chromium --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: |
            server.log
            server.pid
